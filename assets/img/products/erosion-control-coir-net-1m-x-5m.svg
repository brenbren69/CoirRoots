<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <rect width="600" height="400" fill="#F5ECD7"/>
  <defs>
    <pattern id="bg" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#8B6914" opacity="0.2"/>
    </pattern>
    <!-- Net grid pattern -->
    <pattern id="netGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M0,10 H20 M10,0 V20" stroke="#8B5E3C" stroke-width="2.5" fill="none"/>
    </pattern>
  </defs>
  <rect width="600" height="400" fill="url(#bg)" opacity="0.3"/>

  <!-- Ground/slope background -->
  <polygon points="0,400 600,400 600,230 0,320" fill="#C8A96E" opacity="0.4"/>
  <!-- Soil texture on slope -->
  <polygon points="0,400 600,400 600,230 0,320" fill="url(#bg)" opacity="0.5"/>

  <!-- Rolled up coir net on left -->
  <g transform="translate(80, 160)">
    <!-- cylinder for rolled net -->
    <ellipse cx="45" cy="90" rx="20" ry="45" fill="#9C6840"/>
    <rect x="25" y="10" width="40" height="80" fill="#8B5E3C"/>
    <!-- net texture on roll -->
    <line x1="30" y1="20" x2="60" y2="20" stroke="#6B4A2A" stroke-width="2" opacity="0.6"/>
    <line x1="30" y1="35" x2="60" y2="35" stroke="#6B4A2A" stroke-width="2" opacity="0.6"/>
    <line x1="30" y1="50" x2="60" y2="50" stroke="#6B4A2A" stroke-width="2" opacity="0.6"/>
    <line x1="30" y1="65" x2="60" y2="65" stroke="#6B4A2A" stroke-width="2" opacity="0.6"/>
    <line x1="30" y1="80" x2="60" y2="80" stroke="#6B4A2A" stroke-width="2" opacity="0.6"/>
    <line x1="38" y1="10" x2="38" y2="90" stroke="#6B4A2A" stroke-width="2" opacity="0.5"/>
    <line x1="52" y1="10" x2="52" y2="90" stroke="#6B4A2A" stroke-width="2" opacity="0.5"/>
    <ellipse cx="45" cy="10" rx="20" ry="8" fill="#A07040"/>
    <!-- label band -->
    <rect x="25" y="52" width="40" height="16" fill="#4A7C3F" opacity="0.9"/>
    <text x="45" y="63" text-anchor="middle" font-family="Arial" font-size="7" fill="white">1m×5m</text>
  </g>

  <!-- Unrolled net on slope (main feature) -->
  <g transform="translate(160, 130)">
    <!-- Net laid on ground -->
    <rect x="0" y="0" width="340" height="190" fill="url(#netGrid)" opacity="0.85" rx="3"/>
    <rect x="0" y="0" width="340" height="190" fill="#8B5E3C" opacity="0.2" rx="3"/>

    <!-- Pegs/stakes holding net -->
    <rect x="20" y="-10" width="6" height="25" rx="2" fill="#5C3D1E"/>
    <polygon points="23,-10 17,-20 29,-20" fill="#5C3D1E"/>
    <rect x="160" y="-10" width="6" height="25" rx="2" fill="#5C3D1E"/>
    <polygon points="163,-10 157,-20 169,-20" fill="#5C3D1E"/>
    <rect x="314" y="-10" width="6" height="25" rx="2" fill="#5C3D1E"/>
    <polygon points="317,-10 311,-20 323,-20" fill="#5C3D1E"/>
    <rect x="20" y="178" width="6" height="25" rx="2" fill="#5C3D1E"/>
    <polygon points="23,203 17,213 29,213" fill="#5C3D1E"/>
    <rect x="160" y="178" width="6" height="25" rx="2" fill="#5C3D1E"/>
    <polygon points="163,203 157,213 169,213" fill="#5C3D1E"/>
    <rect x="314" y="178" width="6" height="25" rx="2" fill="#5C3D1E"/>
    <polygon points="317,203 311,213 323,213" fill="#5C3D1E"/>

    <!-- Vegetation growing through net -->
    <g opacity="0.85">
      <ellipse cx="50" cy="60" rx="15" ry="9" fill="#4A7C3F" transform="rotate(-15,50,60)"/>
      <ellipse cx="90" cy="100" rx="12" ry="7" fill="#5C9E4A" transform="rotate(10,90,100)"/>
      <ellipse cx="140" cy="45" rx="14" ry="8" fill="#3D6B33" transform="rotate(-20,140,45)"/>
      <ellipse cx="200" cy="130" rx="13" ry="8" fill="#4A7C3F" transform="rotate(15,200,130)"/>
      <ellipse cx="260" cy="70" rx="15" ry="9" fill="#5C9E4A" transform="rotate(-10,260,70)"/>
      <ellipse cx="300" cy="150" rx="11" ry="7" fill="#3D6B33" transform="rotate(20,300,150)"/>
      <ellipse cx="80" cy="155" rx="13" ry="8" fill="#4A7C3F" transform="rotate(-5,80,155)"/>
      <ellipse cx="220" cy="40" rx="12" ry="7" fill="#5C9E4A" transform="rotate(10,220,40)"/>
    </g>
  </g>

  <!-- Label -->
  <rect x="165" y="350" width="270" height="35" rx="6" fill="#5C3D1E" opacity="0.85"/>
  <text x="300" y="372" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#F5ECD7" font-weight="bold">Erosion Control Coir Net (1m×5m)</text>

  <text x="565" y="35" font-size="28" text-anchor="middle">🌿</text>
</svg>
