<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <rect width="600" height="400" fill="#F5ECD7"/>
  <defs>
    <pattern id="bg" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#8B6914" opacity="0.2"/>
    </pattern>
    <linearGradient id="boardFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A07840"/>
      <stop offset="100%" stop-color="#7A5A28"/>
    </linearGradient>
    <linearGradient id="boardTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B89050"/>
      <stop offset="100%" stop-color="#9C7838"/>
    </linearGradient>
    <linearGradient id="boardSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B6030"/>
      <stop offset="100%" stop-color="#5C3D1E"/>
    </linearGradient>
    <!-- Dense compressed fiber texture -->
    <pattern id="fiberBoard" width="5" height="5" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="5" y2="5" stroke="#7A5230" stroke-width="0.8" opacity="0.6"/>
      <line x1="5" y1="0" x2="0" y2="5" stroke="#8B6030" stroke-width="0.8" opacity="0.4"/>
    </pattern>
  </defs>
  <rect width="600" height="400" fill="url(#bg)" opacity="0.3"/>

  <!-- Wall cutaway showing board installed -->
  <!-- Wall section (right) -->
  <rect x="360" y="60" width="200" height="280" fill="#D4C4A0" opacity="0.5"/>
  <rect x="360" y="60" width="200" height="280" fill="none" stroke="#B8A880" stroke-width="2" opacity="0.5"/>
  <!-- Wall inner layer -->
  <rect x="370" y="70" width="80" height="260" fill="#C8B890" opacity="0.4"/>
  <!-- Coir board installed in wall cavity -->
  <rect x="450" y="70" width="30" height="260" fill="#9C6840" opacity="0.8"/>
  <rect x="450" y="70" width="30" height="260" fill="url(#fiberBoard)" opacity="0.6"/>
  <!-- Outer wall layer -->
  <rect x="480" y="70" width="70" height="260" fill="#D4C4A0" opacity="0.6"/>

  <!-- Thermal arrow showing insulation -->
  <text x="525" y="180" text-anchor="middle" font-size="22" fill="#E74C3C" opacity="0.8">🌡️</text>
  <line x1="492" y1="200" x2="460" y2="200" stroke="#E74C3C" stroke-width="2.5" marker-end="url(#red)"/>
  <text x="530" y="200" text-anchor="middle" font-family="Arial" font-size="8" fill="#E74C3C">Heat →</text>
  <text x="420" y="200" text-anchor="middle" font-family="Arial" font-size="8" fill="#4A7C3F">Blocked</text>

  <!-- Main board (isometric) -->
  <!-- Front face -->
  <polygon points="80,160 330,160 330,330 80,330" fill="url(#boardFront)"/>
  <polygon points="80,160 330,160 330,330 80,330" fill="url(#fiberBoard)" opacity="0.6"/>
  <!-- Top face -->
  <polygon points="80,160 330,160 380,115 130,115" fill="url(#boardTop)"/>
  <!-- Right side face (thin - 2.5cm) -->
  <polygon points="330,160 380,115 380,285 330,330" fill="url(#boardSide)"/>

  <!-- Fiber texture on front - dense compressed coir -->
  <line x1="80" y1="185" x2="330" y2="185" stroke="#6B4A2A" stroke-width="1.5" opacity="0.4"/>
  <line x1="80" y1="210" x2="330" y2="210" stroke="#6B4A2A" stroke-width="1.5" opacity="0.4"/>
  <line x1="80" y1="235" x2="330" y2="235" stroke="#6B4A2A" stroke-width="1.5" opacity="0.4"/>
  <line x1="80" y1="260" x2="330" y2="260" stroke="#6B4A2A" stroke-width="1.5" opacity="0.4"/>
  <line x1="80" y1="285" x2="330" y2="285" stroke="#6B4A2A" stroke-width="1.5" opacity="0.4"/>
  <line x1="80" y1="310" x2="330" y2="310" stroke="#6B4A2A" stroke-width="1.5" opacity="0.4"/>
  <line x1="140" y1="160" x2="140" y2="330" stroke="#6B4A2A" stroke-width="1" opacity="0.25"/>
  <line x1="200" y1="160" x2="200" y2="330" stroke="#6B4A2A" stroke-width="1" opacity="0.25"/>
  <line x1="260" y1="160" x2="260" y2="330" stroke="#6B4A2A" stroke-width="1" opacity="0.25"/>

  <!-- Thickness indicator on right face -->
  <text x="363" y="210" text-anchor="middle" font-family="Arial" font-size="9" fill="#F5ECD7" transform="rotate(90,363,210)">2.5cm</text>

  <!-- Spec label on front -->
  <rect x="105" y="195" width="195" height="100" rx="5" fill="#5C3D1E" opacity="0.85"/>
  <text x="202" y="218" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="white" font-weight="bold">COIR INSULATION</text>
  <line x1="113" y1="224" x2="292" y2="224" stroke="#8B6914" stroke-width="1"/>
  <text x="202" y="239" text-anchor="middle" font-family="Arial" font-size="9" fill="#F5ECD7">120 × 60 × 2.5 cm</text>
  <text x="202" y="253" text-anchor="middle" font-family="Arial" font-size="9" fill="#F5DEB3">λ = 0.045 W/m·K</text>
  <text x="202" y="266" text-anchor="middle" font-family="Arial" font-size="9" fill="#F5DEB3">Fire Resistant</text>
  <text x="202" y="280" text-anchor="middle" font-family="Arial" font-size="9" fill="#8B6914">BERDE / LEED Compliant</text>

  <!-- BERDE logo indicator -->
  <rect x="90" y="310" width="55" height="16" rx="4" fill="#4A7C3F" opacity="0.85"/>
  <text x="117" y="322" text-anchor="middle" font-family="Arial" font-size="8" fill="white" font-weight="bold">🌱 BERDE</text>

  <!-- Sound absorption indicator -->
  <g transform="translate(30, 100)">
    <text x="0" y="0" font-size="18" fill="#5C3D1E" opacity="0.5">🔇</text>
    <text x="22" y="0" font-family="Arial" font-size="9" fill="#5C3D1E">0.75 NRC</text>
  </g>

  <!-- Label -->
  <rect x="152" y="350" width="296" height="35" rx="6" fill="#5C3D1E" opacity="0.85"/>
  <text x="300" y="372" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#F5ECD7" font-weight="bold">Coir Fiber Insulation Board</text>

  <!-- Shadow -->
  <ellipse cx="205" cy="338" rx="145" ry="9" fill="#8B5E3C" opacity="0.12"/>

  <text x="565" y="35" font-size="28" text-anchor="middle">🌿</text>
</svg>
