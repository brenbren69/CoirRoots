<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <rect width="600" height="400" fill="#F5ECD7"/>
  <defs>
    <pattern id="bg" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#8B6914" opacity="0.2"/>
    </pattern>
    <pattern id="woven" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#8B5E3C" opacity="0.6"/>
      <rect x="4" y="4" width="4" height="4" fill="#9C6840" opacity="0.6"/>
    </pattern>
  </defs>
  <rect width="600" height="400" fill="url(#bg)" opacity="0.3"/>

  <!-- Grow Bag 1 (back) -->
  <g transform="translate(80, 140)">
    <!-- bag body -->
    <rect x="10" y="30" width="100" height="130" rx="8" fill="url(#woven)"/>
    <rect x="10" y="30" width="100" height="130" rx="8" fill="#7A5230" opacity="0.7"/>
    <!-- horizontal lines for texture -->
    <line x1="10" y1="55" x2="110" y2="55" stroke="#5C3D1E" stroke-width="1.5" opacity="0.4"/>
    <line x1="10" y1="80" x2="110" y2="80" stroke="#5C3D1E" stroke-width="1.5" opacity="0.4"/>
    <line x1="10" y1="105" x2="110" y2="105" stroke="#5C3D1E" stroke-width="1.5" opacity="0.4"/>
    <line x1="10" y1="130" x2="110" y2="130" stroke="#5C3D1E" stroke-width="1.5" opacity="0.4"/>
    <!-- top opening -->
    <ellipse cx="60" cy="30" rx="50" ry="10" fill="#6B4423"/>
    <!-- plant growing from bag -->
    <line x1="60" y1="20" x2="60" y2="-20" stroke="#4A7C3F" stroke-width="3"/>
    <ellipse cx="48" cy="-18" rx="14" ry="8" fill="#4A7C3F" transform="rotate(-25,48,-18)"/>
    <ellipse cx="72" cy="-22" rx="12" ry="7" fill="#5C9E4A" transform="rotate(20,72,-22)"/>
    <ellipse cx="60" cy="-35" rx="11" ry="6" fill="#3D6B33" transform="rotate(5,60,-35)"/>
  </g>

  <!-- Grow Bag 2 -->
  <g transform="translate(190, 120)">
    <rect x="10" y="30" width="110" height="145" rx="8" fill="#8B5E3C"/>
    <line x1="10" y1="58" x2="120" y2="58" stroke="#5C3D1E" stroke-width="1.5" opacity="0.4"/>
    <line x1="10" y1="86" x2="120" y2="86" stroke="#5C3D1E" stroke-width="1.5" opacity="0.4"/>
    <line x1="10" y1="114" x2="120" y2="114" stroke="#5C3D1E" stroke-width="1.5" opacity="0.4"/>
    <line x1="10" y1="142" x2="120" y2="142" stroke="#5C3D1E" stroke-width="1.5" opacity="0.4"/>
    <!-- vertical threads -->
    <line x1="40" y1="30" x2="40" y2="175" stroke="#6B4A2A" stroke-width="1" opacity="0.3"/>
    <line x1="70" y1="30" x2="70" y2="175" stroke="#6B4A2A" stroke-width="1" opacity="0.3"/>
    <line x1="100" y1="30" x2="100" y2="175" stroke="#6B4A2A" stroke-width="1" opacity="0.3"/>
    <ellipse cx="65" cy="30" rx="55" ry="11" fill="#6B4423"/>
    <!-- tomato plant -->
    <line x1="65" y1="19" x2="65" y2="-35" stroke="#4A7C3F" stroke-width="3.5"/>
    <ellipse cx="50" cy="-15" rx="16" ry="9" fill="#4A7C3F" transform="rotate(-30,50,-15)"/>
    <ellipse cx="80" cy="-20" rx="14" ry="8" fill="#5C9E4A" transform="rotate(25,80,-20)"/>
    <ellipse cx="65" cy="-38" rx="13" ry="8" fill="#3D6B33"/>
    <!-- small tomatoes -->
    <circle cx="55" cy="-8" r="7" fill="#E74C3C" opacity="0.9"/>
    <circle cx="75" cy="-5" r="6" fill="#C0392B" opacity="0.9"/>
  </g>

  <!-- Grow Bag 3 (front center, larger) -->
  <g transform="translate(310, 130)">
    <rect x="10" y="30" width="120" height="155" rx="9" fill="#9C6840"/>
    <line x1="10" y1="60" x2="130" y2="60" stroke="#5C3D1E" stroke-width="1.5" opacity="0.4"/>
    <line x1="10" y1="90" x2="130" y2="90" stroke="#5C3D1E" stroke-width="1.5" opacity="0.4"/>
    <line x1="10" y1="120" x2="130" y2="120" stroke="#5C3D1E" stroke-width="1.5" opacity="0.4"/>
    <line x1="10" y1="150" x2="130" y2="150" stroke="#5C3D1E" stroke-width="1.5" opacity="0.4"/>
    <line x1="40" y1="30" x2="40" y2="185" stroke="#6B4A2A" stroke-width="1" opacity="0.3"/>
    <line x1="75" y1="30" x2="75" y2="185" stroke="#6B4A2A" stroke-width="1" opacity="0.3"/>
    <line x1="110" y1="30" x2="110" y2="185" stroke="#6B4A2A" stroke-width="1" opacity="0.3"/>
    <ellipse cx="70" cy="30" rx="60" ry="12" fill="#7A5230"/>
    <!-- bushy plant -->
    <line x1="70" y1="18" x2="70" y2="-45" stroke="#4A7C3F" stroke-width="4"/>
    <line x1="70" y1="-10" x2="45" y2="-35" stroke="#4A7C3F" stroke-width="2.5"/>
    <line x1="70" y1="-10" x2="95" y2="-35" stroke="#4A7C3F" stroke-width="2.5"/>
    <ellipse cx="70" cy="-50" rx="22" ry="13" fill="#4A7C3F"/>
    <ellipse cx="40" cy="-40" rx="18" ry="10" fill="#5C9E4A" transform="rotate(-20,40,-40)"/>
    <ellipse cx="100" cy="-40" rx="17" ry="10" fill="#3D6B33" transform="rotate(20,100,-40)"/>
  </g>

  <!-- Grow Bag 4 -->
  <g transform="translate(440, 150)">
    <rect x="10" y="30" width="100" height="135" rx="8" fill="#8B5E3C"/>
    <line x1="10" y1="56" x2="110" y2="56" stroke="#5C3D1E" stroke-width="1.5" opacity="0.4"/>
    <line x1="10" y1="82" x2="110" y2="82" stroke="#5C3D1E" stroke-width="1.5" opacity="0.4"/>
    <line x1="10" y1="108" x2="110" y2="108" stroke="#5C3D1E" stroke-width="1.5" opacity="0.4"/>
    <line x1="10" y1="134" x2="110" y2="134" stroke="#5C3D1E" stroke-width="1.5" opacity="0.4"/>
    <ellipse cx="60" cy="30" rx="50" ry="10" fill="#6B4423"/>
    <!-- strawberry plant -->
    <line x1="60" y1="20" x2="60" y2="-15" stroke="#4A7C3F" stroke-width="3"/>
    <ellipse cx="50" cy="-12" rx="13" ry="7" fill="#4A7C3F" transform="rotate(-20,50,-12)"/>
    <ellipse cx="70" cy="-14" rx="11" ry="6" fill="#5C9E4A" transform="rotate(15,70,-14)"/>
    <circle cx="58" cy="-5" r="6" fill="#E74C3C"/>
    <circle cx="50" cy="-6" r="2" fill="#F5ECD7" opacity="0.7"/>
  </g>

  <!-- Label -->
  <rect x="185" y="348" width="230" height="35" rx="6" fill="#5C3D1E" opacity="0.85"/>
  <text x="300" y="370" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#F5ECD7" font-weight="bold">Coir Grow Bags — 5pcs</text>

  <text x="565" y="35" font-size="28" text-anchor="middle">🌿</text>
</svg>
