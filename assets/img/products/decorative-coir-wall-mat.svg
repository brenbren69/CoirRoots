<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <rect width="600" height="400" fill="#F5ECD7"/>
  <defs>
    <pattern id="bg" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#8B6914" opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="600" height="400" fill="url(#bg)" opacity="0.3"/>

  <!-- Wall background -->
  <rect x="100" y="40" width="400" height="320" fill="#EDE0C8" opacity="0.7"/>

  <!-- Hanging rod -->
  <rect x="130" y="58" width="340" height="10" rx="5" fill="#8B6914"/>
  <circle cx="140" cy="63" r="8" fill="#9C7020" stroke="#7A5818" stroke-width="2"/>
  <circle cx="460" cy="63" r="8" fill="#9C7020" stroke="#7A5818" stroke-width="2"/>
  <!-- hanging strings -->
  <line x1="155" y1="68" x2="170" y2="90" stroke="#7A5230" stroke-width="2"/>
  <line x1="445" y1="68" x2="430" y2="90" stroke="#7A5230" stroke-width="2"/>

  <!-- Main mat body -->
  <rect x="160" y="88" width="280" height="210" rx="5" fill="#8B5E3C"/>

  <!-- Filipino weaving patterns - horizontal bands -->
  <!-- Top band: geometric zigzag -->
  <rect x="160" y="88" width="280" height="32" fill="#7A5230"/>
  <polygon points="160,88 175,108 190,88" fill="#9C6840"/>
  <polygon points="190,88 205,108 220,88" fill="#A07040"/>
  <polygon points="220,88 235,108 250,88" fill="#9C6840"/>
  <polygon points="250,88 265,108 280,88" fill="#A07040"/>
  <polygon points="280,88 295,108 310,88" fill="#9C6840"/>
  <polygon points="310,88 325,108 340,88" fill="#A07040"/>
  <polygon points="340,88 355,108 370,88" fill="#9C6840"/>
  <polygon points="370,88 385,108 400,88" fill="#A07040"/>
  <polygon points="400,88 415,108 430,88" fill="#9C6840"/>
  <polygon points="430,88 440,108 440,88" fill="#A07040"/>

  <!-- Main center field with woven diamond pattern -->
  <rect x="160" y="120" width="280" height="146" fill="#9C6840"/>
  <!-- Diamond motifs (traditional Filipino bayong weave) -->
  <!-- Row 1 of diamonds -->
  <polygon points="220,135 240,155 220,175 200,155" fill="#7A5230" opacity="0.7"/>
  <polygon points="220,135 240,155 220,175 200,155" fill="none" stroke="#F5ECD7" stroke-width="1.5" opacity="0.5"/>
  <polygon points="300,135 320,155 300,175 280,155" fill="#7A5230" opacity="0.7"/>
  <polygon points="300,135 320,155 300,175 280,155" fill="none" stroke="#F5ECD7" stroke-width="1.5" opacity="0.5"/>
  <polygon points="380,135 400,155 380,175 360,155" fill="#7A5230" opacity="0.7"/>
  <polygon points="380,135 400,155 380,175 360,155" fill="none" stroke="#F5ECD7" stroke-width="1.5" opacity="0.5"/>

  <!-- Row 2 of diamonds (offset) -->
  <polygon points="260,175 280,195 260,215 240,195" fill="#6B4423" opacity="0.7"/>
  <polygon points="260,175 280,195 260,215 240,195" fill="none" stroke="#F5ECD7" stroke-width="1.5" opacity="0.5"/>
  <polygon points="340,175 360,195 340,215 320,195" fill="#6B4423" opacity="0.7"/>
  <polygon points="340,175 360,195 340,215 320,195" fill="none" stroke="#F5ECD7" stroke-width="1.5" opacity="0.5"/>

  <!-- Row 3 -->
  <polygon points="220,215 240,235 220,255 200,235" fill="#7A5230" opacity="0.7"/>
  <polygon points="220,215 240,235 220,255 200,235" fill="none" stroke="#F5ECD7" stroke-width="1.5" opacity="0.5"/>
  <polygon points="300,215 320,235 300,255 280,235" fill="#7A5230" opacity="0.7"/>
  <polygon points="300,215 320,235 300,255 280,235" fill="none" stroke="#F5ECD7" stroke-width="1.5" opacity="0.5"/>
  <polygon points="380,215 400,235 380,255 360,235" fill="#7A5230" opacity="0.7"/>
  <polygon points="380,215 400,235 380,255 360,235" fill="none" stroke="#F5ECD7" stroke-width="1.5" opacity="0.5"/>

  <!-- Accent thread dots at diamond centers -->
  <circle cx="220" cy="155" r="4" fill="#8B6914"/>
  <circle cx="300" cy="155" r="4" fill="#8B6914"/>
  <circle cx="380" cy="155" r="4" fill="#8B6914"/>
  <circle cx="260" cy="195" r="4" fill="#8B6914"/>
  <circle cx="340" cy="195" r="4" fill="#8B6914"/>
  <circle cx="220" cy="235" r="4" fill="#8B6914"/>
  <circle cx="300" cy="235" r="4" fill="#8B6914"/>
  <circle cx="380" cy="235" r="4" fill="#8B6914"/>

  <!-- Bottom band: horizontal stripe pattern -->
  <rect x="160" y="266" width="280" height="32" fill="#7A5230"/>
  <line x1="160" y1="274" x2="440" y2="274" stroke="#A07040" stroke-width="2" opacity="0.6"/>
  <line x1="160" y1="282" x2="440" y2="282" stroke="#F5ECD7" stroke-width="1.5" opacity="0.4"/>
  <line x1="160" y1="290" x2="440" y2="290" stroke="#A07040" stroke-width="2" opacity="0.6"/>

  <!-- Side fringe -->
  <g opacity="0.8">
    <line x1="160" y1="298" x2="155" y2="320" stroke="#8B5E3C" stroke-width="2"/>
    <line x1="170" y1="298" x2="168" y2="322" stroke="#9C6840" stroke-width="2"/>
    <line x1="180" y1="298" x2="177" y2="321" stroke="#8B5E3C" stroke-width="2"/>
    <line x1="190" y1="298" x2="190" y2="322" stroke="#9C6840" stroke-width="2"/>
    <line x1="200" y1="298" x2="202" y2="320" stroke="#8B5E3C" stroke-width="2"/>
    <line x1="210" y1="298" x2="210" y2="323" stroke="#9C6840" stroke-width="2"/>
    <line x1="220" y1="298" x2="218" y2="321" stroke="#8B5E3C" stroke-width="2"/>
    <line x1="230" y1="298" x2="232" y2="322" stroke="#9C6840" stroke-width="2"/>
    <line x1="240" y1="298" x2="239" y2="320" stroke="#8B5E3C" stroke-width="2"/>
    <line x1="250" y1="298" x2="252" y2="323" stroke="#9C6840" stroke-width="2"/>
    <line x1="260" y1="298" x2="258" y2="321" stroke="#8B5E3C" stroke-width="2"/>
    <line x1="270" y1="298" x2="272" y2="322" stroke="#9C6840" stroke-width="2"/>
    <line x1="280" y1="298" x2="280" y2="320" stroke="#8B5E3C" stroke-width="2"/>
    <line x1="290" y1="298" x2="291" y2="323" stroke="#9C6840" stroke-width="2"/>
    <line x1="300" y1="298" x2="298" y2="321" stroke="#8B5E3C" stroke-width="2"/>
    <line x1="310" y1="298" x2="312" y2="322" stroke="#9C6840" stroke-width="2"/>
    <line x1="320" y1="298" x2="319" y2="320" stroke="#8B5E3C" stroke-width="2"/>
    <line x1="330" y1="298" x2="332" y2="323" stroke="#9C6840" stroke-width="2"/>
    <line x1="340" y1="298" x2="338" y2="321" stroke="#8B5E3C" stroke-width="2"/>
    <line x1="350" y1="298" x2="352" y2="322" stroke="#9C6840" stroke-width="2"/>
    <line x1="360" y1="298" x2="360" y2="320" stroke="#8B5E3C" stroke-width="2"/>
    <line x1="370" y1="298" x2="371" y2="323" stroke="#9C6840" stroke-width="2"/>
    <line x1="380" y1="298" x2="378" y2="321" stroke="#8B5E3C" stroke-width="2"/>
    <line x1="390" y1="298" x2="392" y2="322" stroke="#9C6840" stroke-width="2"/>
    <line x1="400" y1="298" x2="399" y2="320" stroke="#8B5E3C" stroke-width="2"/>
    <line x1="410" y1="298" x2="412" y2="323" stroke="#9C6840" stroke-width="2"/>
    <line x1="420" y1="298" x2="418" y2="321" stroke="#8B5E3C" stroke-width="2"/>
    <line x1="430" y1="298" x2="432" y2="320" stroke="#9C6840" stroke-width="2"/>
    <line x1="440" y1="298" x2="440" y2="322" stroke="#8B5E3C" stroke-width="2"/>
  </g>

  <!-- Handmade badge -->
  <rect x="460" y="130" width="105" height="60" rx="8" fill="#8B6914" opacity="0.9"/>
  <text x="512" y="153" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="white">Handcrafted</text>
  <text x="512" y="167" text-anchor="middle" font-family="Arial" font-size="9" fill="#F5ECD7">by Filipino</text>
  <text x="512" y="180" text-anchor="middle" font-family="Arial" font-size="9" fill="#F5ECD7">Artisans</text>

  <!-- Dimensions label -->
  <text x="300" y="345" text-anchor="middle" font-family="Arial" font-size="11" fill="#5C3D1E" opacity="0.7">50cm × 80cm</text>

  <!-- Label -->
  <rect x="155" y="350" width="290" height="35" rx="6" fill="#5C3D1E" opacity="0.85"/>
  <text x="300" y="372" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#F5ECD7" font-weight="bold">Decorative Coir Wall Mat</text>

  <text x="565" y="35" font-size="28" text-anchor="middle">🌿</text>
</svg>
