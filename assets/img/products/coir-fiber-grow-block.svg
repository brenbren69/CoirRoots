  <!-- Orchid/plant on top of block -->
  <g transform="translate(300, 145)">
    <!-- stem -->
    <line x1="0" y1="0" x2="0" y2="-60" stroke="#4A7C3F" stroke-width="3"/>
    <line x1="0" y1="-30" x2="-25" y2="-50" stroke="#4A7C3F" stroke-width="2"/>
    <line x1="0" y1="-30" x2="25" y2="-50" stroke="#4A7C3F" stroke-width="2"/>
    <!-- orchid flowers -->
    <ellipse cx="0" cy="-68" rx="12" ry="8" fill="#D4A8E0" opacity="0.9"/>
    <ellipse cx="-10" cy="-62" rx="10" ry="7" fill="#C490D0" opacity="0.9" transform="rotate(-30,-10,-62)"/>
    <ellipse cx="10" cy="-62" rx="10" ry="7" fill="#B870C0" opacity="0.9" transform="rotate(30,10,-62)"/>
    <!-- leaves -->
    <ellipse cx="-30" cy="-54" rx="16" ry="8" fill="#4A7C3F" transform="rotate(-20,-30,-54)"/>
    <ellipse cx="30" cy="-54" rx="15" ry="8" fill="#5C9E4A" transform="rotate(20,30,-54)"/>
