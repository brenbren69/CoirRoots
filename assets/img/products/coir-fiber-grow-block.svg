  <rect x="180" y="348" width="240" height="35" rx="6" fill="#5C3D1E" opacity="0.85"/>
  <text x="300" y="370" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#F5ECD7" font-weight="bold">Coir Fiber Grow Block</text>

  <!-- Shadow -->
  <ellipse cx="320" cy="345" rx="155" ry="12" fill="#8B5E3C" opacity="0.12"/>

  <text x="565" y="35" font-size="28" text-anchor="middle">🌿</text>
