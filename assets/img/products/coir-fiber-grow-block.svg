  <rect x="350" y="243" width="23" height="12" rx="3" fill="#7A5230" opacity="0.4"/>
  <rect x="381" y="247" width="20" height="14" rx="3" fill="#6B4423" opacity="0.5"/>
  <rect x="408" y="240" width="16" height="13" rx="3" fill="#5C3D1E" opacity="0.4"/>

