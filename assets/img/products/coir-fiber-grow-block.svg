<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <rect width="600" height="400" fill="#F5ECD7"/>
  <defs>
    <pattern id="bg" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#8B6914" opacity="0.2"/>
    </pattern>
    <linearGradient id="blockFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A07040"/>
      <stop offset="100%" stop-color="#7A5230"/>
    </linearGradient>
    <linearGradient id="blockTop2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B08040"/>
      <stop offset="100%" stop-color="#8B6030"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)" opacity="0.3"/>

  <!-- Block main body -->
  <!-- Front face -->
  <polygon points="160,200 440,200 440,330 160,330" fill="url(#blockFront)"/>
  <!-- Top face -->
  <polygon points="160,200 440,200 490,155 210,155" fill="url(#blockTop2)"/>
  <!-- Right face -->
  <polygon points="440,200 490,155 490,285 440,330" fill="#6B4423"/>

  <!-- Fiber chunks texture on front - coarse coir fiber look -->
