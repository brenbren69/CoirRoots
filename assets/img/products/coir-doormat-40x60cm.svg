<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <rect width="600" height="400" fill="#F5ECD7"/>
  <defs>
    <pattern id="bg" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#8B6914" opacity="0.2"/>
    </pattern>
    <!-- Coir fiber tuft pattern -->
    <pattern id="coirTuft" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="2.5" fill="#8B5E3C" opacity="0.8"/>
      <circle cx="4" cy="4" r="1.5" fill="#9C6840" opacity="0.6"/>
    </pattern>
    <!-- Dense fiber mat texture -->
    <pattern id="matFiber" width="6" height="6" patternUnits="userSpaceOnUse">
      <line x1="0" y1="3" x2="6" y2="3" stroke="#7A5230" stroke-width="2" opacity="0.7"/>
      <line x1="3" y1="0" x2="3" y2="6" stroke="#8B5E3C" stroke-width="1.5" opacity="0.5"/>
    </pattern>
  </defs>
  <rect width="600" height="400" fill="url(#bg)" opacity="0.3"/>

  <!-- Floor surface -->
  <rect x="0" y="310" width="600" height="90" fill="#D4C4A0" opacity="0.5"/>
  <line x1="0" y1="310" x2="600" y2="310" stroke="#B8A880" stroke-width="2" opacity="0.4"/>

  <!-- Mat shadow -->
  <rect x="112" y="305" width="376" height="15" rx="5" fill="#8B5E3C" opacity="0.15"/>

  <!-- Mat body (perspective view, slightly angled) -->
  <rect x="110" y="130" width="380" height="180" rx="8" fill="url(#matFiber)"/>
  <rect x="110" y="130" width="380" height="180" rx="8" fill="#9C6840" opacity="0.55"/>

  <!-- Dense tufted surface texture -->
  <rect x="120" y="140" width="360" height="160" rx="5" fill="url(#coirTuft)"/>
  <rect x="120" y="140" width="360" height="160" rx="5" fill="#8B5E3C" opacity="0.3"/>

  <!-- Fiber bundle rows (horizontal) - characteristic of hand-tufted coir mat -->
  <line x1="120" y1="158" x2="480" y2="158" stroke="#6B4A2A" stroke-width="2.5" opacity="0.45"/>
  <line x1="120" y1="174" x2="480" y2="174" stroke="#7A5230" stroke-width="2" opacity="0.4"/>
  <line x1="120" y1="190" x2="480" y2="190" stroke="#6B4A2A" stroke-width="2.5" opacity="0.45"/>
  <line x1="120" y1="206" x2="480" y2="206" stroke="#7A5230" stroke-width="2" opacity="0.4"/>
  <line x1="120" y1="222" x2="480" y2="222" stroke="#6B4A2A" stroke-width="2.5" opacity="0.45"/>
  <line x1="120" y1="238" x2="480" y2="238" stroke="#7A5230" stroke-width="2" opacity="0.4"/>
  <line x1="120" y1="254" x2="480" y2="254" stroke="#6B4A2A" stroke-width="2.5" opacity="0.45"/>
  <line x1="120" y1="270" x2="480" y2="270" stroke="#7A5230" stroke-width="2" opacity="0.4"/>
  <line x1="120" y1="286" x2="480" y2="286" stroke="#6B4A2A" stroke-width="2.5" opacity="0.45"/>

  <!-- Border frame of mat (darker edges) -->
  <rect x="110" y="130" width="380" height="180" rx="8" fill="none" stroke="#5C3D1E" stroke-width="6"/>
  <rect x="122" y="142" width="356" height="156" rx="4" fill="none" stroke="#7A5230" stroke-width="2"/>

  <!-- Text/pattern on mat -->
  <text x="300" y="218" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#5C3D1E" opacity="0.55" font-weight="bold" letter-spacing="4">WELCOME</text>

  <!-- Natural latex backing (visible underneath/around) -->
  <rect x="108" y="128" width="384" height="184" rx="10" fill="none" stroke="#C8A96E" stroke-width="3" opacity="0.5"/>

  <!-- Spec badges -->
  <rect x="30" y="155" width="65" height="48" rx="6" fill="#4A7C3F" opacity="0.9"/>
  <text x="62" y="174" text-anchor="middle" font-family="Arial" font-size="9" fill="white">40×60</text>
  <text x="62" y="187" text-anchor="middle" font-family="Arial" font-size="9" fill="#F5ECD7">cm</text>
  <text x="62" y="197" text-anchor="middle" font-family="Arial" font-size="8" fill="#F5DEB3">Anti-slip</text>

  <rect x="505" y="155" width="65" height="48" rx="6" fill="#8B6914" opacity="0.9"/>
  <text x="537" y="173" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Natural</text>
  <text x="537" y="185" text-anchor="middle" font-family="Arial" font-size="8" fill="#F5ECD7">Latex</text>
  <text x="537" y="197" text-anchor="middle" font-family="Arial" font-size="8" fill="#F5DEB3">Backing</text>

  <!-- Footprints on mat -->
  <g opacity="0.2" fill="#2C1810">
    <ellipse cx="248" cy="245" rx="12" ry="18" transform="rotate(-10,248,245)"/>
    <ellipse cx="260" cy="225" rx="10" ry="15" transform="rotate(-10,260,225)"/>
    <ellipse cx="340" cy="248" rx="12" ry="18" transform="rotate(10,340,248)"/>
    <ellipse cx="328" cy="227" rx="10" ry="15" transform="rotate(10,328,227)"/>
  </g>

  <!-- Label -->
  <rect x="168" y="348" width="264" height="35" rx="6" fill="#5C3D1E" opacity="0.85"/>
  <text x="300" y="370" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#F5ECD7" font-weight="bold">Coir Doormat (40×60cm)</text>

  <text x="565" y="35" font-size="28" text-anchor="middle">🌿</text>
</svg>
