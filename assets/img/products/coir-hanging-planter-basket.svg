<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <rect width="600" height="400" fill="#F5ECD7"/>
  <defs>
    <pattern id="bg" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#8B6914" opacity="0.2"/>
    </pattern>
    <radialGradient id="basketGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#A07040"/>
      <stop offset="100%" stop-color="#6B4423"/>
    </radialGradient>
    <radialGradient id="shellGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#C8A96E"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </radialGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)" opacity="0.3"/>

  <!-- Ceiling hook -->
  <rect x="292" y="10" width="16" height="30" rx="5" fill="#8B6914"/>
  <path d="M295,35 Q285,50 288,60 Q295,70 305,60 Q310,50 305,35" fill="none" stroke="#8B6914" stroke-width="6" stroke-linecap="round"/>

  <!-- Jute hanging rope (3 strands) -->
  <line x1="290" y1="65" x2="250" y2="130" stroke="#8B6914" stroke-width="3.5" opacity="0.9"/>
  <line x1="300" y1="65" x2="300" y2="135" stroke="#9C7820" stroke-width="3" opacity="0.85"/>
  <line x1="310" y1="65" x2="350" y2="130" stroke="#8B6914" stroke-width="3.5" opacity="0.9"/>

  <!-- Ring/collar gathering ropes -->
  <ellipse cx="300" cy="135" rx="55" ry="10" fill="none" stroke="#7A5818" stroke-width="4"/>

  <!-- Basket body (hemisphere shape) -->
  <path d="M245,135 Q230,200 240,255 Q270,300 300,305 Q330,300 360,255 Q370,200 355,135 Z"
        fill="url(#basketGrad)"/>

  <!-- Coir fiber texture lines (horizontal bands) -->
  <path d="M246,155 Q300,148 354,155" stroke="#5C3D1E" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M242,175 Q300,168 358,175" stroke="#5C3D1E" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M240,195 Q300,188 360,195" stroke="#5C3D1E" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M240,215 Q300,208 360,215" stroke="#5C3D1E" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M242,235 Q300,228 358,235" stroke="#5C3D1E" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M246,255 Q300,248 354,255" stroke="#5C3D1E" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M252,273 Q300,267 348,273" stroke="#5C3D1E" stroke-width="1.5" fill="none" opacity="0.45"/>
  <path d="M260,288 Q300,283 340,288" stroke="#5C3D1E" stroke-width="1.5" fill="none" opacity="0.4"/>

  <!-- Vertical fiber lines -->
  <line x1="260" y1="140" x2="252" y2="285" stroke="#7A5230" stroke-width="1.5" opacity="0.3"/>
  <line x1="280" y1="136" x2="273" y2="295" stroke="#7A5230" stroke-width="1.5" opacity="0.3"/>
  <line x1="300" y1="135" x2="300" y2="303" stroke="#7A5230" stroke-width="1.5" opacity="0.3"/>
  <line x1="320" y1="136" x2="327" y2="295" stroke="#7A5230" stroke-width="1.5" opacity="0.3"/>
  <line x1="340" y1="140" x2="348" y2="285" stroke="#7A5230" stroke-width="1.5" opacity="0.3"/>

  <!-- Coconut shell base -->
  <ellipse cx="300" cy="305" rx="45" ry="22" fill="url(#shellGrad)"/>
  <ellipse cx="300" cy="305" rx="38" ry="17" fill="#9C7830" opacity="0.6"/>
  <!-- Shell texture lines -->
  <path d="M262,305 Q300,295 338,305" stroke="#7A5818" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M265,310 Q300,302 335,310" stroke="#7A5818" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- Drainage hole -->
  <circle cx="300" cy="305" r="5" fill="#5C3D1E" opacity="0.6"/>

  <!-- Plants in basket (trailing pothos-style) -->
  <!-- Central plant -->
  <line x1="300" y1="140" x2="300" y2="90" stroke="#4A7C3F" stroke-width="3"/>
  <ellipse cx="285" cy="90" rx="22" ry="13" fill="#4A7C3F" transform="rotate(-20,285,90)"/>
  <ellipse cx="315" cy="88" rx="20" ry="12" fill="#5C9E4A" transform="rotate(15,315,88)"/>
  <ellipse cx="300" cy="75" rx="18" ry="11" fill="#3D6B33"/>

  <!-- Trailing vines left -->
  <path d="M255,160 Q220,180 200,200 Q185,215 175,240" stroke="#4A7C3F" stroke-width="2.5" fill="none"/>
  <ellipse cx="200" cy="198" rx="18" ry="10" fill="#4A7C3F" transform="rotate(-30,200,198)" opacity="0.9"/>
  <ellipse cx="180" cy="235" rx="16" ry="9" fill="#5C9E4A" transform="rotate(-15,180,235)" opacity="0.9"/>

  <!-- Trailing vines right -->
  <path d="M345,160 Q380,180 400,200 Q415,215 425,240" stroke="#4A7C3F" stroke-width="2.5" fill="none"/>
  <ellipse cx="400" cy="198" rx="17" ry="10" fill="#3D6B33" transform="rotate(30,400,198)" opacity="0.9"/>
  <ellipse cx="420" cy="235" rx="15" ry="9" fill="#4A7C3F" transform="rotate(15,420,235)" opacity="0.9"/>

  <!-- Spec badge -->
  <rect x="440" y="200" width="120" height="68" rx="8" fill="#4A7C3F" opacity="0.9"/>
  <text x="500" y="222" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">25cm Diameter</text>
  <text x="500" y="238" text-anchor="middle" font-family="Arial" font-size="9" fill="#F5ECD7">Adjustable</text>
  <text x="500" y="252" text-anchor="middle" font-family="Arial" font-size="9" fill="#F5ECD7">Jute Rope</text>
  <text x="500" y="262" text-anchor="middle" font-family="Arial" font-size="9" fill="#F5DEB3">60cm drop</text>

  <!-- Label -->
  <rect x="148" y="350" width="304" height="35" rx="6" fill="#5C3D1E" opacity="0.85"/>
  <text x="300" y="372" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#F5ECD7" font-weight="bold">Coir Hanging Planter Basket</text>

  <text x="565" y="35" font-size="28" text-anchor="middle">🌿</text>
</svg>
