<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <rect width="600" height="400" fill="#F5ECD7"/>
  <defs>
    <pattern id="bg" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#8B6914" opacity="0.2"/>
    </pattern>
    <pattern id="weave" width="12" height="12" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#9C7040" opacity="0.7"/>
      <rect x="6" y="6" width="6" height="6" fill="#8B6030" opacity="0.7"/>
      <rect x="6" y="0" width="6" height="6" fill="#A07840" opacity="0.5"/>
      <rect x="0" y="6" width="6" height="6" fill="#7A5230" opacity="0.5"/>
    </pattern>
  </defs>
  <rect width="600" height="400" fill="url(#bg)" opacity="0.3"/>

  <!-- Stack of 3 sandbags in background -->
  <!-- Bottom bag -->
  <g transform="translate(280, 260)">
    <rect x="-90" y="-30" width="190" height="65" rx="18" fill="#8B5E3C" opacity="0.7"/>
    <rect x="-90" y="-30" width="190" height="65" rx="18" fill="url(#weave)" opacity="0.6"/>
    <line x1="-90" y1="-10" x2="100" y2="-10" stroke="#5C3D1E" stroke-width="2" opacity="0.4"/>
    <line x1="-90" y1="10" x2="100" y2="10" stroke="#5C3D1E" stroke-width="2" opacity="0.4"/>
    <line x1="-30" y1="-30" x2="-30" y2="35" stroke="#6B4A2A" stroke-width="1.5" opacity="0.35"/>
    <line x1="30" y1="-30" x2="30" y2="35" stroke="#6B4A2A" stroke-width="1.5" opacity="0.35"/>
  </g>

  <!-- Middle bag -->
  <g transform="translate(270, 205)">
    <rect x="-88" y="-30" width="188" height="63" rx="18" fill="#9C6840" opacity="0.85"/>
    <rect x="-88" y="-30" width="188" height="63" rx="18" fill="url(#weave)" opacity="0.55"/>
    <line x1="-88" y1="-10" x2="100" y2="-10" stroke="#5C3D1E" stroke-width="2" opacity="0.4"/>
    <line x1="-88" y1="10" x2="100" y2="10" stroke="#5C3D1E" stroke-width="2" opacity="0.4"/>
    <!-- tie at top -->
    <path d="M0,-30 Q-15,-45 -8,-52 Q0,-58 8,-52 Q15,-45 0,-30" fill="#6B4423" stroke="#5C3D1E" stroke-width="1"/>
    <ellipse cx="0" cy="-55" rx="6" ry="4" fill="#5C3D1E"/>
  </g>

  <!-- Main front bag (large, detailed) -->
  <g transform="translate(300, 195)">
    <!-- Bag body -->
    <rect x="-110" y="-20" width="220" height="140" rx="22" fill="#8B5E3C"/>
    <rect x="-110" y="-20" width="220" height="140" rx="22" fill="url(#weave)" opacity="0.7"/>

    <!-- Woven texture details -->
    <line x1="-110" y1="10" x2="110" y2="10" stroke="#5C3D1E" stroke-width="2.5" opacity="0.4"/>
    <line x1="-110" y1="40" x2="110" y2="40" stroke="#5C3D1E" stroke-width="2.5" opacity="0.4"/>
    <line x1="-110" y1="70" x2="110" y2="70" stroke="#5C3D1E" stroke-width="2.5" opacity="0.4"/>
    <line x1="-110" y1="100" x2="110" y2="100" stroke="#5C3D1E" stroke-width="2.5" opacity="0.4"/>
    <line x1="-55" y1="-20" x2="-55" y2="120" stroke="#6B4A2A" stroke-width="2" opacity="0.3"/>
    <line x1="0" y1="-20" x2="0" y2="120" stroke="#6B4A2A" stroke-width="2" opacity="0.3"/>
    <line x1="55" y1="-20" x2="55" y2="120" stroke="#6B4A2A" stroke-width="2" opacity="0.3"/>

    <!-- Tie closure on top -->
    <path d="M0,-20 Q-20,-42 -10,-52 Q0,-60 10,-52 Q20,-42 0,-20" fill="#7A5230" stroke="#5C3D1E" stroke-width="1.5"/>
    <ellipse cx="0" cy="-57" rx="8" ry="5" fill="#5C3D1E"/>
    <line x1="-12" y1="-55" x2="12" y2="-55" stroke="#8B6914" stroke-width="2"/>

    <!-- Label on bag -->
    <rect x="-55" y="30" width="110" height="45" rx="5" fill="#4A7C3F" opacity="0.9"/>
    <text x="0" y="52" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">COIR SANDBAG</text>
    <text x="0" y="67" text-anchor="middle" font-family="Arial" font-size="9" fill="#F5ECD7">40cm × 60cm</text>

    <!-- Drainage holes indication -->
    <circle cx="-80" cy="80" r="4" fill="#5C3D1E" opacity="0.5"/>
    <circle cx="-65" cy="90" r="3" fill="#5C3D1E" opacity="0.4"/>
    <circle cx="65" cy="80" r="4" fill="#5C3D1E" opacity="0.5"/>
    <circle cx="80" cy="92" r="3" fill="#5C3D1E" opacity="0.4"/>
  </g>

  <!-- Water droplets showing drainage -->
  <g opacity="0.7">
    <ellipse cx="205" cy="335" rx="3" ry="5" fill="#7AB3D4"/>
    <ellipse cx="218" cy="342" rx="2" ry="4" fill="#7AB3D4"/>
    <ellipse cx="385" cy="338" rx="3" ry="5" fill="#7AB3D4"/>
  </g>

  <!-- Stack of empty bags (right side) -->
  <g transform="translate(490, 200)" opacity="0.8">
    <rect x="0" y="0" width="80" height="110" rx="8" fill="#9C6840"/>
    <rect x="0" y="0" width="80" height="110" rx="8" fill="url(#weave)" opacity="0.5"/>
    <line x1="0" y1="25" x2="80" y2="25" stroke="#5C3D1E" stroke-width="1.5" opacity="0.4"/>
    <line x1="0" y1="50" x2="80" y2="50" stroke="#5C3D1E" stroke-width="1.5" opacity="0.4"/>
    <line x1="0" y1="75" x2="80" y2="75" stroke="#5C3D1E" stroke-width="1.5" opacity="0.4"/>
    <line x1="0" y1="100" x2="80" y2="100" stroke="#5C3D1E" stroke-width="1.5" opacity="0.4"/>
    <text x="40" y="58" text-anchor="middle" font-family="Arial" font-size="9" fill="#F5ECD7">Empty</text>
    <text x="40" y="71" text-anchor="middle" font-family="Arial" font-size="9" fill="#F5ECD7">Bag</text>
  </g>

  <!-- Label -->
  <rect x="158" y="350" width="284" height="35" rx="6" fill="#5C3D1E" opacity="0.85"/>
  <text x="300" y="372" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#F5ECD7" font-weight="bold">Coir Sandbag / Geotextile Bag</text>

  <text x="565" y="35" font-size="28" text-anchor="middle">🌿</text>
</svg>
